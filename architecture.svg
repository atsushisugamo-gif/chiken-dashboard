<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" font-family="Noto Sans JP, Droid Sans Fallback, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#102845"/>
      <stop offset="35%" stop-color="#0a1c33"/>
      <stop offset="70%" stop-color="#061325"/>
      <stop offset="100%" stop-color="#030a18"/>
    </linearGradient>
    <linearGradient id="topAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c9a558" stop-opacity="0"/>
      <stop offset="20%" stop-color="#c9a558"/>
      <stop offset="50%" stop-color="#f1e4c6"/>
      <stop offset="80%" stop-color="#c9a558"/>
      <stop offset="100%" stop-color="#c9a558" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="boxNavy" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#142643"/>
      <stop offset="100%" stop-color="#0b182c"/>
    </linearGradient>
    <linearGradient id="boxGold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(201,165,88,0.28)"/>
      <stop offset="100%" stop-color="rgba(20,38,67,0.85)"/>
    </linearGradient>
    <linearGradient id="boxBlue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(147,197,253,0.22)"/>
      <stop offset="100%" stop-color="rgba(20,38,67,0.85)"/>
    </linearGradient>
    <linearGradient id="goldNum" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c9a558"/>
      <stop offset="100%" stop-color="#8a6f30"/>
    </linearGradient>
    <linearGradient id="blueNum" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f1e4c6"/>
      <stop offset="50%" stop-color="#c9a558"/>
      <stop offset="100%" stop-color="#f1e4c6"/>
    </linearGradient>
    <marker id="arrowG" markerWidth="14" markerHeight="14" refX="12" refY="5" orient="auto">
      <path d="M0,0 L0,10 L12,5 z" fill="#c9a558"/>
    </marker>
    <!-- Custom mini icons -->
    <symbol id="icoSites" viewBox="0 0 36 36">
      <rect x="6" y="4" width="22" height="28" rx="3" fill="none" stroke="#c9a558" stroke-width="2"/>
      <line x1="10" y1="11" x2="24" y2="11" stroke="#c9a558" stroke-width="2"/>
      <line x1="10" y1="17" x2="24" y2="17" stroke="#c9a558" stroke-width="2"/>
      <line x1="10" y1="23" x2="20" y2="23" stroke="#c9a558" stroke-width="2"/>
    </symbol>
    <symbol id="icoBot" viewBox="0 0 36 36">
      <rect x="8" y="10" width="20" height="18" rx="3" fill="none" stroke="#c9a558" stroke-width="2"/>
      <circle cx="14" cy="19" r="2" fill="#c9a558"/>
      <circle cx="22" cy="19" r="2" fill="#c9a558"/>
      <line x1="18" y1="4" x2="18" y2="10" stroke="#c9a558" stroke-width="2"/>
      <circle cx="18" cy="3" r="2" fill="#c9a558"/>
    </symbol>
    <symbol id="icoData" viewBox="0 0 36 36">
      <ellipse cx="18" cy="9" rx="12" ry="4" fill="none" stroke="#93c5fd" stroke-width="2"/>
      <path d="M6 9 L6 27 Q6 31 18 31 Q30 31 30 27 L30 9" fill="none" stroke="#93c5fd" stroke-width="2"/>
      <path d="M6 18 Q6 22 18 22 Q30 22 30 18" fill="none" stroke="#93c5fd" stroke-width="2"/>
    </symbol>
    <symbol id="icoPaint" viewBox="0 0 36 36">
      <path d="M18 4 C9 4 4 11 4 18 C4 24 8 27 14 26 C12 24 14 20 18 20 L26 20 C30 20 32 17 32 14 C32 8 26 4 18 4 Z" fill="none" stroke="#c9a558" stroke-width="2"/>
      <circle cx="11" cy="14" r="2" fill="#c9a558"/>
      <circle cx="18" cy="11" r="2" fill="#c9a558"/>
      <circle cx="25" cy="14" r="2" fill="#c9a558"/>
    </symbol>
    <symbol id="icoGlobe" viewBox="0 0 36 36">
      <circle cx="18" cy="18" r="13" fill="none" stroke="#93c5fd" stroke-width="2"/>
      <ellipse cx="18" cy="18" rx="6" ry="13" fill="none" stroke="#93c5fd" stroke-width="2"/>
      <line x1="5" y1="18" x2="31" y2="18" stroke="#93c5fd" stroke-width="2"/>
    </symbol>
    <symbol id="icoEye" viewBox="0 0 36 36">
      <path d="M3 18 Q18 5 33 18 Q18 31 3 18 Z" fill="none" stroke="#f1e4c6" stroke-width="2"/>
      <circle cx="18" cy="18" r="5" fill="none" stroke="#f1e4c6" stroke-width="2"/>
      <circle cx="18" cy="18" r="2" fill="#f1e4c6"/>
    </symbol>
    <symbol id="icoPhone" viewBox="0 0 36 36">
      <rect x="11" y="4" width="14" height="28" rx="3" fill="none" stroke="#f1e4c6" stroke-width="2"/>
      <line x1="11" y1="9" x2="25" y2="9" stroke="#f1e4c6" stroke-width="2"/>
      <line x1="11" y1="26" x2="25" y2="26" stroke="#f1e4c6" stroke-width="2"/>
      <circle cx="18" cy="29" r="1.5" fill="#f1e4c6"/>
    </symbol>
    <symbol id="icoBulb" viewBox="0 0 36 36">
      <path d="M18 4 C12 4 8 8 8 14 C8 18 11 21 13 24 L23 24 C25 21 28 18 28 14 C28 8 24 4 18 4 Z" fill="none" stroke="#c9a558" stroke-width="2"/>
      <line x1="14" y1="27" x2="22" y2="27" stroke="#c9a558" stroke-width="2"/>
      <line x1="15" y1="30" x2="21" y2="30" stroke="#c9a558" stroke-width="2"/>
      <circle cx="18" cy="14" r="2" fill="#c9a558"/>
    </symbol>
  </defs>

  <!-- Background -->
  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect x="0" y="0" width="1600" height="4" fill="url(#topAccent)"/>

  <!-- Header -->
  <text x="80" y="92" font-size="42" font-weight="300" letter-spacing="3" fill="url(#titleGrad)">治験案件ダッシュボード</text>
  <text x="80" y="124" font-size="17" letter-spacing="2" fill="#93c5fd" opacity="0.85">— 自動収集 × 自動公開のしくみ —</text>
  <text x="1520" y="92" font-size="14" letter-spacing="1.5" fill="#a8b8d0" text-anchor="end">毎週月曜 朝 9:00 自動実行 ・ 10 サイト統合</text>
  <text x="1520" y="118" font-size="13" font-family="monospace" fill="#c9a558" text-anchor="end">atsushisugamo-gif.github.io/chiken-dashboard/</text>
  <line x1="80" y1="146" x2="1520" y2="146" stroke="#c9a558" stroke-opacity="0.22" stroke-width="1"/>

  <!-- Intro -->
  <text x="80" y="190" font-size="17" fill="#cbd5e1">治験募集サイト <tspan font-weight="700" fill="#f1e4c6">10 社</tspan> を毎週月曜の朝 9 時に <tspan fill="#c9a558" font-weight="700">自動巡回</tspan> し、案件情報を集約・整形して、ブラウザで見やすい一覧ページを生成・公開します。</text>
  <text x="80" y="220" font-size="17" fill="#cbd5e1"><tspan font-weight="700" fill="#f1e4c6">あなたが行う作業はゼロ。</tspan>更新が完了すると Slack に「治験ダッシュボード更新しました」と URL が届きます。</text>

  <!-- Step 1: 10 sites (NAVY) -->
  <g transform="translate(80, 280)">
    <rect width="260" height="240" rx="14" fill="url(#boxNavy)" stroke="#c9a558" stroke-opacity="0.45" stroke-width="1.5"/>
    <rect width="260" height="2" fill="url(#topAccent)"/>
    <circle cx="36" cy="38" r="20" fill="url(#goldNum)"/>
    <text x="36" y="46" font-size="20" font-weight="700" fill="#0a1c33" text-anchor="middle">1</text>
    <use href="#icoSites" x="22" y="76" width="36" height="36"/>
    <text x="22" y="138" font-size="17" font-weight="700" letter-spacing="1" fill="#f1e4c6">10サイトを巡回</text>
    <text x="22" y="164" font-size="11.5" fill="#a8b8d0">生活向上WEB / JCVN /</text>
    <text x="22" y="180" font-size="11.5" fill="#a8b8d0">治験ジャパン / ニューイング /</text>
    <text x="22" y="196" font-size="11.5" fill="#a8b8d0">ぺいるーと / 治験ネット /</text>
    <text x="22" y="212" font-size="11.5" fill="#a8b8d0">治験バンク / 治験ウェブ /</text>
    <text x="22" y="228" font-size="11.5" fill="#a8b8d0">治験情報V-NET / CVS</text>
  </g>
  <text x="210" y="546" font-size="11" font-weight="700" letter-spacing="3" fill="#c9a558" text-anchor="middle">DATA SOURCES</text>

  <line x1="343" y1="400" x2="375" y2="400" stroke="#c9a558" stroke-width="3" marker-end="url(#arrowG)"/>

  <!-- Step 2: scraper (GOLD) -->
  <g transform="translate(386, 280)">
    <rect width="260" height="240" rx="14" fill="url(#boxGold)" stroke="#c9a558" stroke-width="1.8"/>
    <rect width="260" height="2" fill="url(#topAccent)"/>
    <circle cx="36" cy="38" r="20" fill="url(#goldNum)"/>
    <text x="36" y="46" font-size="20" font-weight="700" fill="#0a1c33" text-anchor="middle">2</text>
    <use href="#icoBot" x="22" y="76" width="36" height="36"/>
    <text x="22" y="138" font-size="17" font-weight="700" letter-spacing="1" fill="#f1e4c6">スクレイパー</text>
    <text x="22" y="168" font-size="11.5" fill="#a8b8d0">各案件ページから案件名・</text>
    <text x="22" y="184" font-size="11.5" fill="#a8b8d0">開始日・報酬額・入院/通院回</text>
    <text x="22" y="200" font-size="11.5" fill="#a8b8d0">数を抽出。重複や過去案件は</text>
    <text x="22" y="216" font-size="11.5" fill="#a8b8d0">この段階で除外。</text>
  </g>
  <text x="516" y="546" font-size="11" font-weight="700" letter-spacing="2" fill="#c9a558" text-anchor="middle">SCRAPER.PY</text>

  <line x1="649" y1="400" x2="681" y2="400" stroke="#c9a558" stroke-width="3" marker-end="url(#arrowG)"/>

  <!-- Step 3: data.json (BLUE) -->
  <g transform="translate(692, 280)">
    <rect width="260" height="240" rx="14" fill="url(#boxBlue)" stroke="#93c5fd" stroke-opacity="0.5" stroke-width="1.5"/>
    <rect width="260" height="2" fill="url(#topAccent)"/>
    <circle cx="36" cy="38" r="20" fill="url(#blueNum)"/>
    <text x="36" y="46" font-size="20" font-weight="700" fill="#0a1c33" text-anchor="middle">3</text>
    <use href="#icoData" x="22" y="76" width="36" height="36"/>
    <text x="22" y="138" font-size="17" font-weight="700" letter-spacing="1" fill="#f1e4c6">データ統合</text>
    <text x="22" y="168" font-size="11.5" fill="#a8b8d0">サイトをまたぐ重複案件を1</text>
    <text x="22" y="184" font-size="11.5" fill="#a8b8d0">つにまとめ、地域名を整形</text>
    <text x="22" y="200" font-size="11.5" fill="#a8b8d0">（市区町村優先）、</text>
    <text x="22" y="216" font-size="11.5" fill="#a8b8d0">入院/通院を自動分類。</text>
  </g>
  <text x="822" y="546" font-size="11" font-weight="700" letter-spacing="2" fill="#93c5fd" text-anchor="middle">DATA.JSON</text>

  <line x1="955" y1="400" x2="987" y2="400" stroke="#c9a558" stroke-width="3" marker-end="url(#arrowG)"/>

  <!-- Step 4: dashboard gen (GOLD) -->
  <g transform="translate(998, 280)">
    <rect width="260" height="240" rx="14" fill="url(#boxGold)" stroke="#c9a558" stroke-width="1.8"/>
    <rect width="260" height="2" fill="url(#topAccent)"/>
    <circle cx="36" cy="38" r="20" fill="url(#goldNum)"/>
    <text x="36" y="46" font-size="20" font-weight="700" fill="#0a1c33" text-anchor="middle">4</text>
    <use href="#icoPaint" x="22" y="76" width="36" height="36"/>
    <text x="22" y="138" font-size="17" font-weight="700" letter-spacing="1" fill="#f1e4c6">ダッシュボード生成</text>
    <text x="22" y="168" font-size="11.5" fill="#a8b8d0">関東特集セクション・タイム</text>
    <text x="22" y="184" font-size="11.5" fill="#a8b8d0">ライン・グラフ・絞り込みタブ</text>
    <text x="22" y="200" font-size="11.5" fill="#a8b8d0">をまとめて、見やすい一枚の</text>
    <text x="22" y="216" font-size="11.5" fill="#a8b8d0">HTML に組み立て。</text>
  </g>
  <text x="1128" y="546" font-size="11" font-weight="700" letter-spacing="2" fill="#c9a558" text-anchor="middle">ADD_TIMELINE.PY</text>

  <line x1="1261" y1="400" x2="1293" y2="400" stroke="#c9a558" stroke-width="3" marker-end="url(#arrowG)"/>

  <!-- Step 5: GitHub Pages (BLUE) -->
  <g transform="translate(1304, 280)">
    <rect width="216" height="240" rx="14" fill="url(#boxBlue)" stroke="#93c5fd" stroke-opacity="0.5" stroke-width="1.5"/>
    <rect width="216" height="2" fill="url(#topAccent)"/>
    <circle cx="36" cy="38" r="20" fill="url(#blueNum)"/>
    <text x="36" y="46" font-size="20" font-weight="700" fill="#0a1c33" text-anchor="middle">5</text>
    <use href="#icoGlobe" x="22" y="76" width="36" height="36"/>
    <text x="22" y="138" font-size="17" font-weight="700" letter-spacing="1" fill="#f1e4c6">公開</text>
    <text x="22" y="168" font-size="11.5" fill="#a8b8d0">GitHub Pages に自動アップ</text>
    <text x="22" y="184" font-size="11.5" fill="#a8b8d0">ロード。誰でも URL から</text>
    <text x="22" y="200" font-size="11.5" fill="#a8b8d0">アクセスして閲覧可能。</text>
    <text x="22" y="216" font-size="11.5" fill="#a8b8d0">HTTPS で安全。</text>
  </g>
  <text x="1412" y="546" font-size="11" font-weight="700" letter-spacing="2" fill="#93c5fd" text-anchor="middle">GITHUB PAGES</text>

  <!-- Endings (drop down from step 5) -->
  <line x1="1412" y1="565" x2="1412" y2="595" stroke="#c9a558" stroke-width="2.5"/>
  <line x1="1412" y1="595" x2="610" y2="595" stroke="#c9a558" stroke-width="2.5"/>
  <line x1="610" y1="595" x2="610" y2="640" stroke="#c9a558" stroke-width="2.5" marker-end="url(#arrowG)"/>
  <line x1="990" y1="595" x2="990" y2="640" stroke="#c9a558" stroke-width="2.5" marker-end="url(#arrowG)"/>

  <g transform="translate(450, 660)">
    <rect width="320" height="84" rx="12" fill="url(#boxNavy)" stroke="#93c5fd" stroke-opacity="0.4" stroke-width="1.5"/>
    <use href="#icoEye" x="28" y="24" width="40" height="40"/>
    <text x="92" y="46" font-size="18" font-weight="700" letter-spacing="1" fill="#f1e4c6">ブラウザで閲覧</text>
    <text x="92" y="68" font-size="12" fill="#a8b8d0">PC / スマホ どこからでも</text>
  </g>

  <g transform="translate(830, 660)">
    <rect width="320" height="84" rx="12" fill="url(#boxNavy)" stroke="#93c5fd" stroke-opacity="0.4" stroke-width="1.5"/>
    <use href="#icoPhone" x="28" y="24" width="40" height="40"/>
    <text x="92" y="46" font-size="18" font-weight="700" letter-spacing="1" fill="#f1e4c6">Slack で通知</text>
    <text x="92" y="68" font-size="12" fill="#a8b8d0">完了したら URL が届く</text>
  </g>

  <!-- Value box -->
  <g transform="translate(80, 800)">
    <rect width="1440" height="100" rx="10" fill="rgba(201,165,88,0.10)" stroke="#c9a558" stroke-opacity="0.45" stroke-width="1"/>
    <rect width="5" height="100" fill="#c9a558"/>
    <use href="#icoBulb" x="24" y="30" width="40" height="40"/>
    <text x="84" y="42" font-size="15" font-weight="700" fill="#c9a558">このしくみの価値</text>
    <text x="84" y="68" font-size="14" fill="#cbd5e1">10 サイトを 1 件ずつ手作業で確認すると <tspan font-weight="700" fill="#f1e4c6">約30分</tspan>かかりますが、ここでは<tspan font-weight="700" fill="#f1e4c6"> 0分</tspan>。データの取得・集計・整形・公開はすべて自動。</text>
    <text x="84" y="88" font-size="14" fill="#cbd5e1"><tspan font-weight="700" fill="#c9a558">毎週同じ品質のレポートが届く</tspan>から、案件の見落としがありません。</text>
  </g>

  <!-- Footer -->
  <line x1="80" y1="940" x2="1520" y2="940" stroke="#c9a558" stroke-opacity="0.15" stroke-width="1"/>
  <text x="80" y="966" font-size="12" letter-spacing="2" fill="#6b7c93">治験案件ダッシュボード — Architecture Overview</text>
  <text x="1520" y="966" font-size="12" letter-spacing="2" fill="#6b7c93" text-anchor="end">v1.0 ・ generated 2026</text>
</svg>
