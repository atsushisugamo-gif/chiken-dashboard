name: Weekly dashboard update

# 毎週月曜 09:00 JST (= 00:00 UTC) に実行。
# Actions タブから "Run workflow" で手動実行も可能。
on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch: {}

permissions:
  contents: write   # data.json / index.html / dashboard.html を commit & push するため

concurrency:
  group: weekly-dashboard-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TZ: Asia/Tokyo
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Snapshot previous data.json (for diff)
        run: |
          if [ -f data.json ]; then
            cp data.json /tmp/prev_data.json
          else
            echo '{"items": []}' > /tmp/prev_data.json
          fi

      - name: Restore credentials.json from secret
        env:
          CREDENTIALS_JSON: ${{ secrets.CREDENTIALS_JSON }}
        run: |
          if [ -z "$CREDENTIALS_JSON" ]; then
            echo "::warning::CREDENTIALS_JSON secret is empty — login-required sites will be skipped."
            cp credentials.example.json credentials.json
          else
            printf '%s' "$CREDENTIALS_JSON" > credentials.json
          fi

      - name: Run scraper (全10サイト)
        id: scrape
        continue-on-error: true
        run: |
          python3 scraper.py 2>&1 | tee /tmp/scraper.log

      - name: Rebuild dashboard HTML
        run: python3 add_timeline.py 2>&1 | tee /tmp/add_timeline.log

      - name: Compute diff and build Slack message
        id: diff
        run: |
          python3 << 'PY'
          import json, os
          with open('/tmp/prev_data.json') as f: prev = json.load(f)
          with open('data.json') as f:           cur  = json.load(f)
          cur_by_url  = {i['url']: i for i in cur.get('items', [])}
          prev_by_url = {i['url']: i for i in prev.get('items', [])}
          new_n     = len(set(cur_by_url)  - set(prev_by_url))
          removed_n = len(set(prev_by_url) - set(cur_by_url))
          updated_n = 0
          for u in set(cur_by_url) & set(prev_by_url):
              c, p = cur_by_url[u], prev_by_url[u]
              if (c.get('compensation_num') != p.get('compensation_num')
                  or c.get('title') != p.get('title')
                  or c.get('scraped_start_date') != p.get('scraped_start_date')):
                  updated_n += 1
          total = new_n + updated_n + removed_n
          updated_at = cur.get('updated_at', '不明')

          # シンプルなメッセージ：件数とリンクだけ
          if total == 0:
              msg = (
                  f"📊 *治験ダッシュボード週次更新*\n"
                  f"✅ 今週は変更なし（{updated_at}）\n"
                  f"<https://atsushisugamo-gif.github.io/chiken-dashboard/|ダッシュボードを開く>"
              )
          else:
              msg = (
                  f"📊 *治験ダッシュボード週次更新*\n"
                  f"🆕 {new_n} / 📝 {updated_n} / 🗑 {removed_n} 件の変更（{updated_at}）\n"
                  f"<https://atsushisugamo-gif.github.io/chiken-dashboard/|ダッシュボードを開く>"
              )

          with open('/tmp/slack_payload.json', 'w') as f:
              json.dump({"text": msg}, f, ensure_ascii=False)

          out = os.environ['GITHUB_OUTPUT']
          with open(out, 'a') as f:
              f.write(f"diff_count={total}\n")
              f.write(f"new_count={new_n}\n")
              f.write(f"updated_count={updated_n}\n")
              f.write(f"removed_count={removed_n}\n")
          print(f"diff_count={total} (new={new_n} upd={updated_n} rm={removed_n})")
          PY

      - name: Commit and push if data changed
        if: steps.diff.outputs.diff_count != '0'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json index.html dashboard.html
          git diff --cached --quiet || git commit -m "chore: weekly update $(date +%F) (+${{ steps.diff.outputs.new_count }}/~${{ steps.diff.outputs.updated_count }}/-${{ steps.diff.outputs.removed_count }})"
          git push

      - name: Notify Slack
        if: always() && env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ ! -f /tmp/slack_payload.json ]; then
            echo "{\"text\":\":warning: 治験ダッシュボード週次更新がエラーで終了しました。Actions のログを確認してください。\"}" > /tmp/slack_payload.json
          fi
          curl -sS -X POST -H 'Content-Type: application/json' --data @/tmp/slack_payload.json "$SLACK_WEBHOOK_URL"

      - name: Cleanup credentials.json
        if: always()
        run: rm -f credentials.json
